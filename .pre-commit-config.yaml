# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.14.10
    hooks:
      # Run the linter.
      - id: ruff-check
      # Run the formatter.
      - id: ruff-format

  # self-baked local hook for ty, replacing mypy
  - repo: local
    hooks:
      - id: ty-check
        name: ty check
        language: python
        entry: uv run --active ty check
        types_or:
          - python
